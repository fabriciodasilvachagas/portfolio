<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Fabricio Silva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--Menu de navegação-->
    <nav>
        <!--Botao para armazenar as opções em caso de telas menores-->
        <button class="menu-toggle" id="menu-toggle">☰</button>

        <ul class="menu" id="menu">
            <li><a href="index.html">Sobre mim</a></li>
            <li><a href="formacao.html">Formação</a></li>
            <li><a href="portfolio.html">Portfólio</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <!--Formulário para contato-->
    <form>
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome">

        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email">

        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem"></textarea>

        <button type="submit" onclick="validacao()">Enviar</button>
    </form>

<script src="index.js"></script>
<script>
    const toggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");

    toggle.addEventListener("click", () => {

        menu.classList.toggle("active");

        if(menu.classList.contains("active")){
            toggle.innerHTML = "✕";
            toggle.style.color = "white"
            toggle.style.backgroundColor = "#0d47a1"
        }else{
            toggle.innerHTML = "☰";
            toggle.style.color = "#0d47a1"
            toggle.style.backgroundColor = "white"
        }

    });
</script>
</body>
</html>
